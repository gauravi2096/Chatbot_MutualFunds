# Streamlit config for INDmoney Fund Chat (Streamlit Cloud).
# https://docs.streamlit.io/develop/api-reference/configuration

[server]
headless = true
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

# Force dark mode regardless of browser theme
[theme]
base = "dark"
primaryColor = "#22c55e"
backgroundColor = "#020617"
secondaryBackgroundColor = "#0f172a"
textColor = "#e5e7eb"
font = "sans serif"

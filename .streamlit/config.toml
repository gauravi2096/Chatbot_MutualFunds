# Streamlit config for INDmoney Fund Chat (Streamlit Cloud).
# https://docs.streamlit.io/develop/api-reference/configuration

[server]
headless = true
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

# Light mode default; app colors
[theme]
base = "light"
primaryColor = "#84CC16"
backgroundColor = "#F8FAFC"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#0f172a"
font = "sans serif"

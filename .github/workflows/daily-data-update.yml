# Phase 4 — Daily data update: run ingestion at 10:00 AM IST and commit updated data.
name: Daily data update

on:
  schedule:
    # 10:00 AM IST = 04:30 UTC
    - cron: "30 4 * * *"
  workflow_dispatch: # Allow manual run from Actions tab

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r phase_0/requirements.txt -r phase_1/requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.tool_cache }}/playwright

      - name: Run data ingestion pipeline
        run: python phase_4/run_daily_update.py
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.tool_cache }}/playwright

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add phase_1/data/funds.json phase_0/data/source_registry.json phase_1/data/chroma
          git diff --staged --quiet || git commit -m "chore(data): daily update funds, registry and vector store [automated]"
          git push
